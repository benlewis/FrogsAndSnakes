<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Frogs &amp; Snakes — Today's Puzzle</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

  <!-- Safari Smart App Banner. app-argument is filled in with the exact /daily
       URL (incl. ?d=) by the script below. -->
  <meta name="apple-itunes-app" content="app-id=6764884642" id="smart-banner" />

  <meta name="robots" content="noindex" />
  <meta name="description" content="Today's Frogs & Snakes puzzle is waiting. Get the app to play." />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(120% 120% at 50% 0%, #16324a 0%, #0b1622 60%, #070f18 100%);
      color: #e8f0ea;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      width: 100%;
      max-width: 380px;
      text-align: center;
    }
    .icon {
      width: 88px; height: 88px;
      margin: 0 auto 20px;
      border-radius: 20px;
      background: linear-gradient(160deg, #1f6b3a, #0f3d22);
      display: flex; align-items: center; justify-content: center;
      font-size: 48px; line-height: 1;
      box-shadow: 0 10px 30px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.08);
    }
    h1 {
      font-size: 26px; font-weight: 800; margin: 0 0 10px;
      letter-spacing: .2px;
      background: linear-gradient(90deg, #5fe08a, #38c6b0);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    p.tagline { font-size: 16px; line-height: 1.45; color: #b9c8bf; margin: 0 0 28px; }
    a.cta {
      display: inline-block;
      width: 100%;
      padding: 15px 20px;
      border-radius: 14px;
      background: linear-gradient(180deg, #34d17f, #1f9d5c);
      color: #06210f;
      font-size: 17px; font-weight: 800; text-decoration: none;
      box-shadow: 0 8px 22px rgba(31,157,92,.4);
    }
    a.cta:active { transform: translateY(1px); }
    .hint { margin-top: 18px; font-size: 13px; color: #7f9488; }
    .hint a { color: #9fe0bb; }
  </style>
</head>
<body>
  <main class="card">
    <div class="icon" aria-hidden="true">🐸</div>
    <h1>Frogs &amp; Snakes</h1>
    <p class="tagline" id="tagline">Today's puzzle is waiting — get Frogs &amp; Snakes.</p>

    <!-- Visible fallback link. Kept as real content in case an in-app browser
         blocks the auto-redirect below. href is patched by the script; the
         literal token is the no-JS fallback. -->
    <a class="cta" id="store-link" href="https://apps.apple.com/app/id6764884642">Get it on the App Store</a>

    <p class="hint">Already have the app? <a id="open-link" href="#">Open today's puzzle</a>.</p>
  </main>

  <script>
    (function () {
      // Single source of truth for the numeric App Store ID
      // (App Store Connect → App Information → Apple ID).
      var APP_STORE_ID = '6764884642';

      // Only accept the four known difficulties; ignore anything else.
      var ALLOWED = { easy: 1, medium: 1, hard: 1, expert: 1 };
      var params = new URLSearchParams(location.search);
      var d = params.get('d');
      if (!ALLOWED[d]) d = null;

      // Local-testing override: on localhost only, ?id=<numericId> lets you
      // exercise the real redirect before the production ID is baked in. Ignored
      // on the live domain, so prod can only ever point at the hardcoded ID.
      var isLocal = /^(localhost|127\.0\.0\.1|0\.0\.0\.0|\[::1\])$/.test(location.hostname);
      var override = isLocal ? params.get('id') : null;
      var appStoreId = (override && /^\d+$/.test(override)) ? override : APP_STORE_ID;
      var storeUrl = 'https://apps.apple.com/app/id' + appStoreId;

      // The exact deep-link URL this page stands in for.
      var dailyUrl = 'https://frogsandsnakes.com/daily' + (d ? ('?d=' + d) : '');

      // Personalize the tagline if a valid difficulty was passed.
      if (d) {
        document.getElementById('tagline').textContent =
          "Today's " + d + " puzzle is waiting — get Frogs & Snakes.";
      }

      // Wire the store links and redirect (only once a numeric ID is available).
      var idKnown = /^\d+$/.test(appStoreId);
      if (idKnown) {
        document.getElementById('store-link').href = storeUrl;
        document.getElementById('open-link').href = dailyUrl;
        // Smart App Banner: include app-argument so a tap re-enters the daily flow.
        document.getElementById('smart-banner').setAttribute(
          'content', 'app-id=' + appStoreId + ', app-argument=' + dailyUrl
        );
        // Soft auto-redirect after ~1.2s. The visible button remains as fallback.
        setTimeout(function () { location.href = storeUrl; }, 1200);
      }
    })();
  </script>
</body>
</html>
